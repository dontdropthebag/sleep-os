services:
  - type: web
    name: sleep-os-kitchen
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SIOS_CORS_ORIGINS
        value: https://sleep-os-lac.vercel.app
