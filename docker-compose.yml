services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - sleep-data:/app/data
    environment:
      - SIOS_DATABASE_URL=sqlite:////app/data/sleep.db
      - SIOS_CORS_ORIGINS=http://localhost:3000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  sleep-data:
